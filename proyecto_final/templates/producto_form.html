{% extends "base.html" %}

{% block content %}
<h2>Agregar Nuevo Producto</h2>

<form method="POST" action="/nuevo_producto" style="max-width: 400px; line-height: 2;">
    <label>Nombre del Producto:</label><br>
    <input type="text" name="nombre" required style="width: 100%;"><br>
    
    <label>Cantidad (Stock):</label><br>
    <input type="number" name="cantidad" required style="width: 100%;"><br>
    
    <label>Precio unitario ($):</label><br>
    <input type="number" step="0.01" name="precio" required style="width: 100%;"><br>
    
    <br>
    <button type="submit" style="padding: 10px 20px; background-color: #007bff; color: white; border: none; cursor: pointer;">
        Guardar en Base de Datos
    </button>
</form>
{% endblock %}
