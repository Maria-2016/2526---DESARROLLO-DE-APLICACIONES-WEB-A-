{% extends "base.html" %}

{% block content %}
<h2>Editar Producto</h2>

<form method="POST" action="/editar_producto/{{ producto.id }}" style="max-width: 400px; line-height: 2;">
    <label>Nombre del Producto:</label><br>
    <input type="text" name="nombre" value="{{ producto.nombre }}" required style="width: 100%; padding: 5px;"><br>
    
    <label>Cantidad (Stock):</label><br>
    <input type="number" name="cantidad" value="{{ producto.cantidad }}" required style="width: 100%; padding: 5px;"><br>
    
    <label>Precio unitario ($):</label><br>
    <input type="number" step="0.01" name="precio" value="{{ producto.precio }}" required style="width: 100%; padding: 5px;"><br>
    
    <br>
    <button type="submit" style="padding: 10px 20px; background-color: #28a745; color: white; border: none; cursor: pointer; border-radius: 5px;">
        Guardar Cambios
    </button>
    <a href="/productos" style="padding: 10px 20px; background-color: #6c757d; color: white; text-decoration: none; border-radius: 5px; margin-left: 10px;">
        Cancelar
    </a>
</form>
{% endblock %}
